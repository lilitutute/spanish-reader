<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>西语外刊阅读器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: #f5f0e8;
      color: #2c2c2c;
      padding: 40px 20px;
    }
    .container { max-width: 780px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 36px; }
    header h1 { font-size: 2rem; color: #8b1a1a; letter-spacing: 2px; }
    header p  { color: #888; font-size: 0.9rem; margin-top: 6px; }

    #article-list { display: block; }
    .article-card-link {
      display: block;
      background: #fff;
      border-radius: 12px;
      padding: 22px 28px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .article-card-link:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.13);
      transform: translateY(-2px);
    }
    .card-title { font-size: 1.15rem; font-weight: bold; color: #1a1a2e; margin-bottom: 6px; }
    .card-meta  { font-size: 0.8rem; color: #aaa; }

    #reader-view { display: none; }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.88rem;
      cursor: pointer;
      color: #555;
      margin-bottom: 20px;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #eee; }

    .article-box {
      background: #fff;
      border-radius: 12px;
      padding: 36px 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .article-title { font-size: 1.5rem; font-weight: bold; color: #1a1a2e; margin-bottom: 6px; }
    .article-meta  {
      font-size: 0.82rem; color: #aaa;
      border-bottom: 1px solid #eee;
      padding-bottom: 14px; margin-bottom: 28px;
    }

    .paragraph-block { margin-bottom: 28px; }
    .es-text {
      font-size: 1.05rem;
      line-height: 2;
      color: #222;
      cursor: pointer;
      border-left: 3px solid transparent;
      padding-left: 12px;
      border-radius: 0 6px 6px 0;
      transition: border-color 0.2s, background 0.2s;
    }
    .es-text:hover  { border-left-color: #c0392b; background: #fff8f8; }
    .es-text.active { border-left-color: #c0392b; background: #fff3f3; }

    .word {
      display: inline;
      cursor: pointer;
      color: #2980b9;
      text-decoration: underline dotted;
      border-radius: 3px;
      padding: 1px 2px;
      transition: background 0.15s;
      pointer-events: auto;
    }
    .word:hover       { background: #fde8e8; color: #c0392b; }
    .word.highlighted { background: #c0392b; color: #fff; text-decoration: none; }

    .zh-translation {
      display: none;
      margin-top: 10px;
      padding: 12px 16px;
      background: #f0f7ff;
      border-radius: 8px;
      font-size: 0.93rem;
      color: #2c5f8a;
      line-height: 1.7;
      border-left: 3px solid #3498db;
    }
    .zh-translation.visible { display: block; }
    .zh-label {
      font-size: 0.72rem; color: #999;
      text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 4px;
    }

    #word-popup {
      position: fixed;
      z-index: 99999;
      background: #1a1a2e;
      color: #fff;
      border-radius: 12px;
      padding: 20px 24px 18px;
      width: 300px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px) scale(0.97);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
    #word-popup.visible { opacity: 1; pointer-events: auto; transform: none; }

    .popup-word     { font-size: 1.5rem; font-weight: bold; color: #f39c12; margin-bottom: 2px; }
    .popup-phonetic { font-size: 0.85rem; color: #aaa; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .play-btn {
      background: #f39c12; border: none; border-radius: 50%;
      width: 28px; height: 28px; cursor: pointer; color: #fff;
      font-size: 0.8rem; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: background 0.2s;
    }
    .play-btn:hover { background: #e67e22; }
    .popup-divider  { border: none; border-top: 1px solid #2e2e4a; margin: 10px 0; }
    .popup-section-title { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .popup-definition { font-size: 0.93rem; color: #e8e8e8; line-height: 1.6; margin-bottom: 10px; }
    .popup-usage      { font-size: 0.87rem; color: #a8d8ea; line-height: 1.6; font-style: italic; }
    .popup-close {
      position: absolute; top: 10px; right: 12px;
      background: none; border: none; color: #666;
      font-size: 1rem; cursor: pointer;
    }
    .popup-close:hover { color: #fff; }

    .hint-bar { text-align: center; font-size: 0.82rem; color: #bbb; margin-bottom: 20px; }
    .hint-bar span { background: #eee; border-radius: 4px; padding: 2px 8px; color: #888; margin: 0 3px; }

    #empty-tip {
      text-align: center; color: #bbb;
      font-size: 0.95rem; padding: 60px 0;
      display: none;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>📰 西语外刊阅读</h1>
    <p>Lee · Aprende · Comprende</p>
  </header>

  <div id="article-list">
    <div id="cards-container"></div>
    <div id="empty-tip">暂无文章，请添加 articles/index.json 📂</div>
  </div>

  <div id="reader-view">
    <button class="back-btn" id="back-btn">← 返回文章列表</button>
    <div class="hint-bar">
      <span>点击段落空白处</span> 查看中文翻译 &nbsp;|&nbsp;
      <span>点击蓝色单词</span> 查看发音与释义
    </div>
    <div class="article-box">
      <div class="article-title" id="reader-title"></div>
      <div class="article-meta"  id="reader-meta"></div>
      <div id="reader-body"></div>
    </div>
  </div>
</div>

<div id="word-popup">
  <button class="popup-close" id="popup-close-btn">✕</button>
  <div class="popup-word"     id="popup-word-text"></div>
  <div class="popup-phonetic">
    <span id="popup-phonetic-text"></span>
    <button class="play-btn" id="play-btn" title="朗读发音">▶</button>
  </div>
  <hr class="popup-divider"/>
  <div class="popup-section-title">📖 中文释义</div>
  <div class="popup-definition" id="popup-definition"></div>
  <hr class="popup-divider"/>
  <div class="popup-section-title">✏️ 文中用法</div>
  <div class="popup-usage" id="popup-usage"></div>
</div>

<script>
// ══════════════════════════════════════════════
// 唯一需要维护的文件：articles/index.json
// 新增文章只需往那个文件加一行路径，这里永远不用动
// ══════════════════════════════════════════════
const INDEX_FILE = "articles/index.json";

let currentWord = "";

// ── 初始化：读取目录 ──
async function init() {
  try {
    const res = await fetch(INDEX_FILE);
    if (!res.ok) throw new Error();
    const fileList = await res.json();

    if (!fileList.length) {
      document.getElementById("empty-tip").style.display = "block";
      return;
    }

    const container = document.getElementById("cards-container");

    for (const filePath of fileList) {
      try {
        const r = await fetch(filePath);
        if (!r.ok) throw new Error();
        const data = await r.json();
        const card = document.createElement("div");
        card.className = "article-card-link";
        card.innerHTML = `
          <div class="card-title">${data.title}</div>
          <div class="card-meta">${data.source} · ${data.date} · ${data.paragraphs.length} 段落</div>
        `;
        card.addEventListener("click", () => openArticle(data));
        container.appendChild(card);
      } catch {
        console.warn("无法加载文章：", filePath);
      }
    }
  } catch {
    document.getElementById("empty-tip").style.display = "block";
  }
}

// ── 打开文章 ──
function openArticle(data) {
  document.getElementById("article-list").style.display = "none";
  document.getElementById("reader-view").style.display  = "block";
  document.getElementById("reader-title").textContent   = data.title;
  document.getElementById("reader-meta").textContent    = `${data.source} · ${data.date}`;
  renderArticle(data);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ── 返回列表 ──
document.getElementById("back-btn").addEventListener("click", () => {
  document.getElementById("reader-view").style.display  = "none";
  document.getElementById("article-list").style.display = "block";
  document.getElementById("reader-body").innerHTML = "";
  closePopup();
});

// ── 渲染段落 ──
function renderArticle(data) {
  const body = document.getElementById("reader-body");
  body.innerHTML = "";

  data.paragraphs.forEach((para) => {
    const block = document.createElement("div");
    block.className = "paragraph-block";

    const esDiv = document.createElement("p");
    esDiv.className = "es-text";

    const zhDiv = document.createElement("div");
    zhDiv.className = "zh-translation";
    zhDiv.innerHTML = `<div class="zh-label">中文翻译</div>${para.zh}`;

    const tokens = para.es.split(/(\b[a-záéíóúüñA-ZÁÉÍÓÚÜÑ]+\b)/u).filter(Boolean);
    tokens.forEach(token => {
      const clean = token.replace(/[^a-záéíóúüñA-ZÁÉÍÓÚÜÑ]/g, "").toLowerCase();
      if (clean && para.words && para.words[clean]) {
        const span = document.createElement("span");
        span.className = "word";
        span.textContent = token;
        span.addEventListener("click", (e) => {
          e.stopPropagation();
          showPopup(e, clean, para.words[clean]);
        });
        esDiv.appendChild(span);
      } else {
        esDiv.appendChild(document.createTextNode(token));
      }
    });

    esDiv.addEventListener("click", () => {
      zhDiv.classList.toggle("visible");
      esDiv.classList.toggle("active");
    });

    block.appendChild(esDiv);
    block.appendChild(zhDiv);
    body.appendChild(block);
  });
}

// ── 弹窗 ──
function showPopup(e, word, data) {
  currentWord = word;
  document.querySelectorAll(".word.highlighted").forEach(el => el.classList.remove("highlighted"));
  e.target.classList.add("highlighted");

  document.getElementById("popup-word-text").textContent     = word;
  document.getElementById("popup-phonetic-text").textContent = data.phonetic || `/${word}/`;
  document.getElementById("popup-definition").textContent    = data.def;
  document.getElementById("popup-usage").textContent         = data.usage;

  const popup = document.getElementById("word-popup");
  popup.classList.add("visible");

  requestAnimationFrame(() => {
    const pw = popup.offsetWidth, ph = popup.offsetHeight;
    const vw = window.innerWidth,  vh = window.innerHeight;
    let x = e.clientX + 12, y = e.clientY + 12;
    if (x + pw > vw - 12) x = e.clientX - pw - 12;
    if (y + ph > vh - 12) y = e.clientY - ph - 12;
    popup.style.left = x + "px";
    popup.style.top  = y + "px";
  });
}

function closePopup() {
  document.getElementById("word-popup").classList.remove("visible");
  document.querySelectorAll(".word.highlighted").forEach(el => el.classList.remove("highlighted"));
  currentWord = "";
}

document.getElementById("play-btn").addEventListener("click", (e) => {
  e.stopPropagation();
  if (!currentWord) return;
  const u = new SpeechSynthesisUtterance(currentWord);
  u.lang = "es-ES"; u.rate = 0.82;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
});

document.getElementById("popup-close-btn").addEventListener("click", (e) => {
  e.stopPropagation();
  closePopup();
});

document.addEventListener("click", (e) => {
  if (!document.getElementById("word-popup").contains(e.target)) closePopup();
});

init();
</script>
</body>
</html>
